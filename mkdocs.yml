# Información general
site_name: 'Redes'
site_description: 'Instalación, mantenimiento y reparación de redes informáticas'
site_author: 'Raul Jesus Lopez'
site_url: http://www.rauljesus.xyz/redes

# Repositorio
repo_name: 'Ver en GitHub'
repo_url: 'https://github.com/la9una/redes'

# Copyright
copyright: '2018 &nbsp; Raul Jesus Lopez'

# Tema
theme:
  name: 'material'
  custom_dir: 'material'
  language: 'es'
  palette:
    primary: 'green'
    accent: 'green'
  font:
    text: 'Roboto'
    code: 'Roboto Mono'
#  feature:
#    tabs: true

# Extra
extra:
  search:
    language: 'es, en'
  disqus: 'rauljesus-xyz'
  social:
    - type: 'twitter'
      link: 'https://twitter.com/la9una'
    - type: 'facebook'
      link: 'https://www.facebook.com/rauljesuslopez'
    - type: 'github'
      link: 'https://github.com/la9una'
#    - type: 'linkedin'
#      link: 'https://de.linkedin.com/in/john-doe'

## CSS Adicional
extra_css:
  - 'stylesheets/extra.css'

# Extensiones
markdown_extensions:
  - admonition
#  - codehilite(guess_lang=false,linenums=true)
  - codehilite(guess_lang=false)
  - toc:
      permalink: true
  - footnotes
  - pymdownx.critic
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg

